name: Diagram Freshness

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  diagram-freshness:
    uses: selamy-labs/.github/.github/workflows/diagram-freshness.yml@main
    with:
      source-globs: |
        agent.manifest.yaml
        contracts/**
        docs/**
        image/**
        policies/**
        reconcile/**
        schemas/**
        scripts/**
        skills/**
        src/**
        workflows/**
      enforce: false
